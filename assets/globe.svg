<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 260 240" width="360" role="img" aria-label="Rotating globe with orbiting satellite">
  <defs>
    <radialGradient id="sphere" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#16436e"/>
      <stop offset="55%" stop-color="#0c2138"/>
      <stop offset="100%" stop-color="#05101d"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="68%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.22"/>
    </radialGradient>
    <clipPath id="globeClip"><circle cx="130" cy="120" r="92"/></clipPath>
  </defs>

  <circle cx="130" cy="120" r="106" fill="url(#halo)"/>
  <circle cx="130" cy="120" r="92" fill="url(#sphere)"/>

  <g clip-path="url(#globeClip)" fill="none" stroke="#58a6ff">
    <g stroke-opacity="0.5" stroke-width="1">
      <ellipse cx="130" cy="120" rx="92" ry="13"/>
      <ellipse cx="130" cy="92"  rx="88" ry="10"/>
      <ellipse cx="130" cy="148" rx="88" ry="10"/>
      <ellipse cx="130" cy="64"  rx="73" ry="7"/>
      <ellipse cx="130" cy="176" rx="73" ry="7"/>
    </g>
    <g stroke-opacity="0.38" stroke-width="1">
      <ellipse cx="130" cy="120" ry="92" rx="0">
        <animate attributeName="rx" dur="12s" repeatCount="indefinite" begin="0s"
          keyTimes="0;0.0625;0.125;0.1875;0.25;0.3125;0.375;0.4375;0.5;0.5625;0.625;0.6875;0.75;0.8125;0.875;0.9375;1"
          values="0;35;65;85;92;85;65;35;0;35;65;85;92;85;65;35;0"/>
      </ellipse>
      <ellipse cx="130" cy="120" ry="92" rx="0">
        <animate attributeName="rx" dur="12s" repeatCount="indefinite" begin="-1s"
          keyTimes="0;0.0625;0.125;0.1875;0.25;0.3125;0.375;0.4375;0.5;0.5625;0.625;0.6875;0.75;0.8125;0.875;0.9375;1"
          values="0;35;65;85;92;85;65;35;0;35;65;85;92;85;65;35;0"/>
      </ellipse>
      <ellipse cx="130" cy="120" ry="92" rx="0">
        <animate attributeName="rx" dur="12s" repeatCount="indefinite" begin="-2s"
          keyTimes="0;0.0625;0.125;0.1875;0.25;0.3125;0.375;0.4375;0.5;0.5625;0.625;0.6875;0.75;0.8125;0.875;0.9375;1"
          values="0;35;65;85;92;85;65;35;0;35;65;85;92;85;65;35;0"/>
      </ellipse>
      <ellipse cx="130" cy="120" ry="92" rx="0">
        <animate attributeName="rx" dur="12s" repeatCount="indefinite" begin="-3s"
          keyTimes="0;0.0625;0.125;0.1875;0.25;0.3125;0.375;0.4375;0.5;0.5625;0.625;0.6875;0.75;0.8125;0.875;0.9375;1"
          values="0;35;65;85;92;85;65;35;0;35;65;85;92;85;65;35;0"/>
      </ellipse>
      <ellipse cx="130" cy="120" ry="92" rx="0">
        <animate attributeName="rx" dur="12s" repeatCount="indefinite" begin="-4s"
          keyTimes="0;0.0625;0.125;0.1875;0.25;0.3125;0.375;0.4375;0.5;0.5625;0.625;0.6875;0.75;0.8125;0.875;0.9375;1"
          values="0;35;65;85;92;85;65;35;0;35;65;85;92;85;65;35;0"/>
      </ellipse>
      <ellipse cx="130" cy="120" ry="92" rx="0">
        <animate attributeName="rx" dur="12s" repeatCount="indefinite" begin="-5s"
          keyTimes="0;0.0625;0.125;0.1875;0.25;0.3125;0.375;0.4375;0.5;0.5625;0.625;0.6875;0.75;0.8125;0.875;0.9375;1"
          values="0;35;65;85;92;85;65;35;0;35;65;85;92;85;65;35;0"/>
      </ellipse>
    </g>
  </g>

  <circle cx="130" cy="120" r="92" fill="none" stroke="#79c0ff" stroke-width="1.5" stroke-opacity="0.9"/>

  <g transform="rotate(-18 130 120)">
    <path id="orbit" d="M 10,120 a 120,40 0 1,0 240,0 a 120,40 0 1,0 -240,0" fill="none" stroke="#3b4654" stroke-opacity="0.6" stroke-width="1"/>
    <circle r="3.2" fill="#7ee787">
      <animateMotion dur="7s" repeatCount="indefinite" rotate="auto">
        <mpath xlink:href="#orbit"/>
      </animateMotion>
    </circle>
  </g>
</svg>
